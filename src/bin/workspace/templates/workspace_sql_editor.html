{% extends "workspace_layout.html" %}
{% block content %}
<div class="h-full flex flex-col">
    <div class="mb-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-blue-100 text-blue-600 p-2 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <h2 class="text-xl font-bold text-gray-800">SQL Editor</h2>
        </div>
    </div>
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm flex-1 flex flex-col overflow-hidden">
        <form up-submit up-target="#query-results" action="/workspace/sql" method="post" class="flex-1 flex flex-col">
            <div class="flex-1 p-0 relative">
                <textarea name="query" class="w-full h-full p-4 font-mono text-sm text-gray-800 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none" placeholder="-- Enter your SQL query here...
SELECT * FROM public.my_table limit 10;" required spellcheck="false">{% if query is defined %}{{ query }}{% endif %}</textarea>
            </div>
            <div class="bg-gray-50 border-t border-gray-200 p-3 flex justify-between items-center">
                <div class="text-xs text-gray-500 flex items-center gap-2">
                    <kbd class="px-2 py-1 bg-white border border-gray-300 rounded shadow-sm">⌘</kbd> + <kbd class="px-2 py-1 bg-white border border-gray-300 rounded shadow-sm">Enter</kbd> to execute
                </div>
                <button type="submit" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-blue-700 transition shadow-sm flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Run Query
                </button>
            </div>
        </form>
    </div>
    
    <div class="mt-6 bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden flex flex-col min-h-[300px]">
        <div class="bg-gray-50 border-b border-gray-200 px-4 py-3">
            <h3 class="text-sm font-semibold text-gray-700">Results</h3>
        </div>
        <div id="query-results" class="flex-1 overflow-auto p-4 flex items-center justify-center bg-gray-50/50">
            <div class="text-center text-gray-400">
                <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                <p class="text-sm">Execute a query to view results</p>
            </div>
        </div>
    </div>
</div>
<script>
    document.querySelector('textarea[name="query"]').addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            this.form.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
        }
    });
</script>
{% endblock %}
